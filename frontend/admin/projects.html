<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Proyectos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <span class="navbar-brand">Mi Portfolio</span>
    <ul class="navbar-links">
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="certifications.html">Certificaciones</a></li>
        <li><a href="projects.html" class="active">Proyectos</a></li>
        <li><a href="messages.html">Mensajes</a></li>
    </ul>
    <div class="navbar-user">
        <button class="btn btn-secondary" onclick="logout()">Salir</button>
    </div>
</nav>

<div class="container">
    <div class="page-header">
        <h2>Proyectos</h2>
        <button class="btn btn-primary" onclick="openModal()">+ Nuevo proyecto</button>
    </div>

    <div class="alert success" id="alert"></div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Título</th>
                    <th>Tecnologías</th>
                    <th>Destacado</th>
                    <th>Orden</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="projectsTable">
                <tr>
                    <td colspan="5" class="empty-state">Cargando...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Modal crear / editar -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <div class="modal-header">
            <h3 id="modalTitle">Nuevo proyecto</h3>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>

        <div class="alert error" id="modalAlert"></div>

        <div class="form-group">
            <label>Título *</label>
            <input type="text" id="fieldTitle" placeholder="Mi proyecto">
        </div>
        <div class="form-group">
            <label>Descripción *</label>
            <textarea id="fieldDescription" placeholder="Descripción del proyecto..."></textarea>
        </div>
        <div class="form-group">
            <label>Tecnologías * <small style="color:var(--text-muted)">(separadas por coma)</small></label>
            <input type="text" id="fieldTechnologies" placeholder="Python, Django, PostgreSQL">
        </div>
        <div class="form-group">
            <label>URL del repositorio</label>
            <input type="url" id="fieldRepoUrl" placeholder="https://github.com/...">
        </div>
        <div class="form-group">
            <label>URL de la demo</label>
            <input type="url" id="fieldDemoUrl" placeholder="https://...">
        </div>
        <div class="form-group">
            <label>Imagen</label>
            <input type="file" id="fieldImage" accept="image/*">
        </div>
        <div class="form-group" style="display:flex; align-items:center; gap:0.7rem;">
            <input type="checkbox" id="fieldFeatured" style="width:auto">
            <label for="fieldFeatured" style="margin:0">Destacado</label>
        </div>
        <div class="form-group">
            <label>Orden</label>
            <input type="number" id="fieldOrder" placeholder="0" min="0">
        </div>

        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
            <button class="btn btn-primary" id="saveBtn" onclick="saveProject()">Guardar</button>
        </div>
    </div>
</div>

<!-- Modal confirmar eliminación -->
<div class="modal-overlay" id="deleteOverlay">
    <div class="modal" style="max-width:380px">
        <div class="modal-header">
            <h3>Eliminar proyecto</h3>
            <button class="modal-close" onclick="closeDelete()">✕</button>
        </div>
        <p style="color:var(--text-muted); font-size:0.9rem">
            ¿Estás seguro que querés eliminar <strong id="deleteProjectName"></strong>? Esta acción no se puede deshacer.
        </p>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeDelete()">Cancelar</button>
            <button class="btn btn-danger" onclick="confirmDelete()">Eliminar</button>
        </div>
    </div>
</div>

<script src="js/auth.js"></script>
<script src="js/projects.js"></script>

</body>
</html>
