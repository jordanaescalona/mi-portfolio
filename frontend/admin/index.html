<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">
        <h1>Panel de administración</h1>
        <p>Ingresá tus credenciales para continuar</p>

        <div class="alert error" id="alert"></div>

        <div class="form-group">
            <label>Usuario</label>
            <input type="text" id="username" placeholder="tu usuario" autofocus>
        </div>

        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="btn btn-primary" id="loginBtn">Ingresar</button>
    </div>
</div>

<script src="js/auth.js"></script>
<script>
    // Si ya tiene token, va directo al dashboard
    if (getToken()) window.location.href = 'dashboard.html';

    document.getElementById('loginBtn').addEventListener('click', async () => {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();

        if (!username || !password) {
            showAlert('alert', 'Completá todos los campos');
            return;
        }

        const btn = document.getElementById('loginBtn');
        btn.textContent = 'Ingresando...';
        btn.disabled = true;

        try {
            const res = await fetch(`${API}/auth/login/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();

            if (!res.ok) {
                showAlert('alert', 'Usuario o contraseña incorrectos');
                return;
            }

            saveToken(data.access, data.refresh);
            window.location.href = 'dashboard.html';

        } catch (err) {
            showAlert('alert', 'Error al conectar con el servidor');
        } finally {
            btn.textContent = 'Ingresar';
            btn.disabled = false;
        }
    });

    // Login con Enter
    document.getElementById('password').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });
</script>

</body>
</html>
